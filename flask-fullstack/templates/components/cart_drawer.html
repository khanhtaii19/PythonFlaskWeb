<!-- Cart Overlay -->
<div id="cart-overlay" class="hidden fixed inset-0 z-[100] flex">
  <div class="flex-1 bg-black/40 backdrop-blur-sm" onclick="closeCart()"></div>
  <div class="w-full max-w-sm bg-white flex flex-col shadow-2xl slide-in">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-coral/10 rounded-xl flex items-center justify-center">
          <i class="fa fa-shopping-bag text-coral"></i>
        </div>
        <div>
          <h2 class="font-extrabold text-slate-900">Giỏ hàng</h2>
          <p class="text-xs text-slate-400 cart-count-text">0 món</p>
        </div>
      </div>
      <button onclick="closeCart()" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100 text-slate-400">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <!-- Empty state -->
    <div id="cart-empty" class="flex-1 flex flex-col items-center justify-center gap-4 p-8 text-center">
      <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center">
        <i class="fa fa-shopping-cart text-3xl text-gray-200"></i>
      </div>
      <div>
        <p class="font-bold text-slate-700 mb-1">Giỏ hàng trống</p>
        <p class="text-sm text-slate-400">Hãy thêm món ngon vào nhé!</p>
      </div>
      <button onclick="closeCart(); window.location='/products'" class="mt-2 bg-coral text-white font-bold px-6 py-2.5 rounded-xl hover:bg-coral-dark transition text-sm">
        Khám phá ngay
      </button>
    </div>

    <!-- Items list -->
    <div id="cart-items-list" class="flex-1 overflow-y-auto px-6 py-4 flex flex-col gap-5 hidden"></div>

    <!-- Footer -->
    <div id="cart-footer" class="hidden border-t border-gray-100 px-6 py-5 bg-gray-50">
      <div class="flex justify-between items-center mb-4">
        <span class="text-sm font-semibold text-slate-500">Tạm tính</span>
        <span id="cart-subtotal" class="font-extrabold text-lg text-coral">0đ</span>
      </div>
      <a href="/checkout" onclick="closeCart()"
         class="block w-full bg-coral text-white text-center font-bold py-3.5 rounded-2xl hover:bg-coral-dark transition text-sm shadow-lg shadow-red-100">
        Thanh toán ngay →
      </a>
      <button onclick="closeCart(); window.location='/products'"
         class="block w-full text-center text-slate-500 text-xs mt-3 hover:text-coral transition font-semibold">
        Tiếp tục mua sắm
      </button>
    </div>
  </div>
</div>

<script>
  // Keep items list & empty state in sync with visibility
  const _origRender = window.renderCartDrawer;
  document.addEventListener('DOMContentLoaded', () => {
    const list  = document.getElementById('cart-items-list');
    const empty = document.getElementById('cart-empty');
    const orig  = window.renderCartDrawer;
    window.renderCartDrawer = function() {
      orig();
      if (window.CART.length > 0) {
        list?.classList.remove('hidden');
        empty?.classList.add('hidden');
      } else {
        list?.classList.add('hidden');
        empty?.classList.remove('hidden');
      }
      // update count text
      const total = window.CART.reduce((s,i)=>s+i.quantity,0);
      document.querySelectorAll('.cart-count-text').forEach(el => el.textContent = `${total} món`);
    };
    window.renderCartDrawer();
  });
</script>
