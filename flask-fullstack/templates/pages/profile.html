{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
  <div id="auth-guard" class="hidden text-center py-20">
    <div class="text-6xl mb-4">🔒</div>
    <p class="text-slate-400 font-semibold mb-4">Vui lòng đăng nhập</p>
    <a href="/login" class="inline-block bg-coral text-white font-bold px-6 py-2.5 rounded-xl">Đăng nhập</a>
  </div>

  <div id="profile-content">
    <h1 class="text-2xl font-extrabold text-slate-900 mb-8">Tài khoản của tôi</h1>

    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm mb-6">
      <!-- Avatar -->
      <div class="flex items-center gap-5 mb-6">
        <div class="relative">
          <img id="profile-avatar" src="" class="w-20 h-20 rounded-2xl object-cover border-4 border-white shadow-lg"/>
          <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-400 rounded-full border-2 border-white"></div>
        </div>
        <div>
          <h2 id="profile-name-display" class="text-xl font-extrabold text-slate-900"></h2>
          <p id="profile-email-display" class="text-slate-400 text-sm"></p>
          <span id="profile-role-badge" class="inline-block mt-1 text-xs font-bold px-2 py-0.5 rounded-full bg-coral/10 text-coral"></span>
        </div>
      </div>

      <!-- Form -->
      <div id="save-success" class="hidden mb-4 bg-green-50 border border-green-100 text-green-700 rounded-xl px-4 py-3 text-sm font-semibold">
        ✓ Cập nhật thành công!
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Họ và tên</label>
          <input id="p-name" type="text" class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral transition"/>
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Email</label>
          <input id="p-email" type="email" disabled class="w-full px-4 py-3 text-sm border border-gray-100 bg-gray-50 rounded-xl text-slate-400 cursor-not-allowed"/>
        </div>
        <button onclick="saveProfile()" class="w-full bg-coral text-white font-bold py-3 rounded-2xl hover:bg-coral-dark transition shadow-lg shadow-red-100">
          Lưu thay đổi
        </button>
      </div>
    </div>

    <!-- Quick links -->
    <div class="grid grid-cols-2 gap-4">
      <a href="/orders" class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition flex items-center gap-4">
        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
          <i class="fa fa-receipt text-blue-500 text-lg"></i>
        </div>
        <div>
          <p class="font-bold text-slate-900 text-sm">Đơn hàng</p>
          <p class="text-xs text-slate-400">Xem lịch sử</p>
        </div>
      </a>
      <button onclick="logout()" class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition flex items-center gap-4 text-left">
        <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center">
          <i class="fa fa-sign-out-alt text-red-500 text-lg"></i>
        </div>
        <div>
          <p class="font-bold text-slate-900 text-sm">Đăng xuất</p>
          <p class="text-xs text-slate-400">Thoát tài khoản</p>
        </div>
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function initProfile() {
  if (!window.USER) {
    document.getElementById('profile-content').classList.add('hidden');
    document.getElementById('auth-guard').classList.remove('hidden');
    return;
  }
  const u = window.USER;
  document.getElementById('profile-avatar').src = u.avatar || `https://ui-avatars.com/api/?name=${u.name}&background=ff5c62&color=fff&size=128`;
  document.getElementById('profile-name-display').textContent  = u.name;
  document.getElementById('profile-email-display').textContent = u.email;
  document.getElementById('profile-role-badge').textContent    = u.role === 'admin' ? 'Quản trị viên' : 'Thành viên';
  document.getElementById('p-name').value  = u.name;
  document.getElementById('p-email').value = u.email;
}

async function saveProfile() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) return;
  try {
    const updated = { ...window.USER, name };
    saveUser(updated);
    updateHeader();
    document.getElementById('save-success').classList.remove('hidden');
    setTimeout(() => document.getElementById('save-success').classList.add('hidden'), 3000);
    initProfile();
  } catch(e) {}
}

initProfile();
</script>
{% endblock %}
