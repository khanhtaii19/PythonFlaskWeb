{% extends 'base.html' %}
{% block footer %}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center bg-gradient-to-br from-orange-50 to-white px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-4">
        <span class="bg-coral text-white rounded-xl px-3 py-1 text-sm font-black">GOURMET</span>
        <span class="text-coral font-extrabold text-xl">Shop</span>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900">Tạo tài khoản mới</h1>
      <p class="text-slate-400 mt-1 text-sm">Tham gia cộng đồng yêu ẩm thực</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
      <div id="error-msg" class="hidden mb-4 bg-red-50 border border-red-100 text-red-600 rounded-xl px-4 py-3 text-sm font-semibold"></div>

      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Họ và tên</label>
          <input id="name" type="text" placeholder="Nguyễn Văn A"
                 class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral focus:ring-1 focus:ring-coral/20 transition" />
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
                 class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral focus:ring-1 focus:ring-coral/20 transition" />
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Mật khẩu</label>
          <input id="password" type="password" placeholder="Tối thiểu 6 ký tự"
                 class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral focus:ring-1 focus:ring-coral/20 transition" />
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Xác nhận mật khẩu</label>
          <input id="confirm" type="password" placeholder="Nhập lại mật khẩu"
                 class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral focus:ring-1 focus:ring-coral/20 transition" />
        </div>
        <button onclick="handleRegister()"
                class="w-full bg-coral text-white font-bold py-3.5 rounded-2xl hover:bg-coral-dark transition shadow-lg shadow-red-100 flex items-center justify-center gap-2 mt-2">
          <i class="fa fa-user-plus"></i> Đăng ký
        </button>
      </div>

      <p class="text-center text-sm text-slate-400 mt-6">
        Đã có tài khoản? 
        <a href="/login" class="text-coral font-bold hover:underline">Đăng nhập</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleRegister() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const errEl    = document.getElementById('error-msg');
  errEl.classList.add('hidden');
  if (!name || !email || !password) { errEl.textContent = 'Vui lòng điền đầy đủ thông tin'; errEl.classList.remove('hidden'); return; }
  if (password !== confirm)         { errEl.textContent = 'Mật khẩu xác nhận không khớp'; errEl.classList.remove('hidden'); return; }
  if (password.length < 6)          { errEl.textContent = 'Mật khẩu phải có ít nhất 6 ký tự'; errEl.classList.remove('hidden'); return; }
  try {
    const res  = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.message || 'Đăng ký thất bại'; errEl.classList.remove('hidden'); return; }
    saveToken(data.token);
    saveUser(data.user);
    window.location.href = '/';
  } catch(e) { errEl.textContent = 'Lỗi kết nối. Thử lại sau.'; errEl.classList.remove('hidden'); }
}
if (window.USER) window.location.href = '/';
</script>
{% endblock %}
