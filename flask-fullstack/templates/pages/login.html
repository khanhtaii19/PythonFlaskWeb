{% extends 'base.html' %}
{% block footer %}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center bg-gradient-to-br from-orange-50 to-white px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-4">
        <span class="bg-coral text-white rounded-xl px-3 py-1 text-sm font-black">GOURMET</span>
        <span class="text-coral font-extrabold text-xl">Shop</span>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900">Chào mừng trở lại!</h1>
      <p class="text-slate-400 mt-1 text-sm">Đăng nhập để tiếp tục mua sắm</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">
      <div id="error-msg" class="hidden mb-4 bg-red-50 border border-red-100 text-red-600 rounded-xl px-4 py-3 text-sm font-semibold"></div>

      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
                 class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral focus:ring-1 focus:ring-coral/20 transition" />
        </div>
        <div>
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Mật khẩu</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Nhập mật khẩu"
                   class="w-full px-4 py-3 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-coral focus:ring-1 focus:ring-coral/20 transition" />
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500">
              <i id="pwd-icon" class="fa fa-eye text-sm"></i>
            </button>
          </div>
        </div>
        <button onclick="handleLogin()"
                class="w-full bg-coral text-white font-bold py-3.5 rounded-2xl hover:bg-coral-dark transition shadow-lg shadow-red-100 flex items-center justify-center gap-2 mt-2">
          <i class="fa fa-sign-in-alt"></i> Đăng nhập
        </button>
      </div>

      <p class="text-center text-sm text-slate-400 mt-6">
        Chưa có tài khoản? 
        <a href="/register" class="text-coral font-bold hover:underline">Đăng ký ngay</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('pwd-icon');
  input.type  = input.type === 'password' ? 'text' : 'password';
  icon.className = `fa fa-${input.type === 'password' ? 'eye' : 'eye-slash'} text-sm`;
}

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  if (!email || !password) { errEl.textContent = 'Vui lòng nhập đầy đủ thông tin'; errEl.classList.remove('hidden'); return; }
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.message || 'Email hoặc mật khẩu không đúng'; errEl.classList.remove('hidden'); return; }
    saveToken(data.token);
    saveUser(data.user);
    updateHeader();
    window.location.href = '/';
  } catch(e) { errEl.textContent = 'Lỗi kết nối. Thử lại sau.'; errEl.classList.remove('hidden'); }
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
if (window.USER) window.location.href = '/';
</script>
{% endblock %}
